apiVersion: apps/v1
kind: Deployment
metadata:
  name: myshop-deployment
  namespace: myshop-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myshop
  template:
    metadata:
      labels:
        app: myshop
    spec:
      containers:
      - name: myshop
        image: babaktanriverdi/myshop:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service   
metadata:
  name: myshop-svc
  namespace: myshop-ns
spec:
  type: ClusterIP  
  ports:
  - port: 80 
    targetPort: 80
  selector:
    app: myshop