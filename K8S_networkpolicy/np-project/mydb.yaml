apiVersion: apps/v1
kind: Deployment
metadata: 
  name: mydb-deployment
  namespace: mydb-ns 
spec:
  replicas: 1
  selector:
    matchLabels:
      db: mydb
  template:
    metadata:
      labels:
        db: mydb
    spec:
      containers:
      - name: mydb
        image: babaktanriverdi/mydb:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service   
metadata:
  name: mydb-svc
  namespace: mydb-ns
spec:
  type: ClusterIP  
  ports:
  - port: 80 
    targetPort: 80
  selector:
    db: mydb