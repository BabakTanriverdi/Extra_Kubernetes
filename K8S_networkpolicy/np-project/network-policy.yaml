apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: test-network-policy
  namespace: mydb-ns
spec:
  podSelector:
    matchLabels:
      db: mydb
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:  
            matchLabels:
              kubernetes.io/metadata.name: myshop-ns
          podSelector:
            matchLabels:
              role: frontend      
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: myshop-ns
      ports:
        - protocol: TCP
          port: 80